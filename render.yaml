services:
  - type: web
    name: gir-rituals
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false   # set in Render dashboard to your frontend URL
      - key: SMTP_HOST
        sync: false   # e.g. smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false   # your Gmail address
      - key: SMTP_PASS
        sync: false   # Gmail App Password (not your login password)
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false   # e.g. +14155552671
      - key: TWILIO_WHATSAPP_FROM
        sync: false   # e.g. +14155238886 (Twilio WhatsApp sender)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
